<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>DartVision Live</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#eee;font-family:-apple-system,system-ui,sans-serif;overflow:hidden;height:100dvh;display:flex;flex-direction:column}
.top-bar{display:flex;align-items:center;gap:8px;padding:6px 10px;background:rgba(20,20,40,.92);flex-shrink:0;flex-wrap:wrap}
.top-bar label{font-size:12px;color:#aab}
.top-bar select,.top-bar input[type=range]{font-size:12px;padding:2px 6px;border-radius:4px;border:1px solid #445;background:#1a1a2e;color:#eee}
.top-bar .val{font-size:11px;color:#e94560;min-width:28px;text-align:center}
.canvas-wrap{flex:1;display:flex;align-items:center;justify-content:center;min-height:0;position:relative}
canvas{max-width:100%;max-height:100%;object-fit:contain}
video{display:none}
.stats{position:absolute;bottom:6px;left:6px;font-size:11px;color:#0f0;background:rgba(0,0,0,.6);padding:3px 8px;border-radius:4px;font-family:monospace}
.btn-start{padding:10px 28px;border:none;border-radius:8px;background:#e94560;color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin:10px auto;display:block}
.btn-start:active{opacity:.7}
</style>
</head>
<body>

<div class="top-bar">
  <label>Modus:</label>
  <select id="vizMode">
    <option value="gray+motion+edges">Grau + Motion + Edges</option>
    <option value="gray+edges">Grau + Edges</option>
    <option value="motion">Nur Motion</option>
    <option value="edges">Nur Edges</option>
    <option value="gray">Nur Grau</option>
  </select>
  <label>Thresh:</label>
  <input type="range" id="threshold" min="5" max="80" value="25">
  <span class="val" id="threshVal">25</span>
  <label>Edge:</label>
  <input type="range" id="edgeSens" min="20" max="200" value="80">
  <span class="val" id="edgeVal">80</span>
</div>

<div class="canvas-wrap">
  <canvas id="out"></canvas>
  <div class="stats" id="stats">-- fps</div>
</div>

<button class="btn-start" id="btnStart">Kamera starten</button>

<video id="cam" autoplay playsinline muted></video>

<script>
const cam = document.getElementById('cam');
const out = document.getElementById('out');
const ctx = out.getContext('2d', { willReadFrequently: true });
const statsEl = document.getElementById('stats');
const btnStart = document.getElementById('btnStart');
const threshSlider = document.getElementById('threshold');
const threshVal = document.getElementById('threshVal');
const edgeSlider = document.getElementById('edgeSens');
const edgeVal = document.getElementById('edgeVal');
const vizMode = document.getElementById('vizMode');

let prevGray = null;
let running = false;
let frameCount = 0;
let lastFpsTime = performance.now();

threshSlider.addEventListener('input', () => { threshVal.textContent = threshSlider.value; });
edgeSlider.addEventListener('input', () => { edgeVal.textContent = edgeSlider.value; });

btnStart.addEventListener('click', startCam);

async function startCam() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 640 }, height: { ideal: 480 } },
      audio: false
    });
    cam.srcObject = stream;
    await cam.play();
    btnStart.style.display = 'none';
    out.width = cam.videoWidth;
    out.height = cam.videoHeight;
    running = true;
    prevGray = null;
    requestAnimationFrame(processFrame);
  } catch (e) {
    alert('Kamera-Zugriff fehlgeschlagen: ' + e.message);
  }
}

function processFrame() {
  if (!running) return;

  const w = cam.videoWidth, h = cam.videoHeight;
  if (w === 0 || h === 0) { requestAnimationFrame(processFrame); return; }

  // Draw camera frame to canvas
  ctx.drawImage(cam, 0, 0, w, h);
  const frame = ctx.getImageData(0, 0, w, h);
  const data = frame.data;
  const mode = vizMode.value;
  const motionThresh = parseInt(threshSlider.value);
  const edgeThresh = parseInt(edgeSlider.value);

  // Convert to grayscale array
  const gray = new Uint8Array(w * h);
  for (let i = 0; i < w * h; i++) {
    const off = i * 4;
    gray[i] = (data[off] * 77 + data[off + 1] * 150 + data[off + 2] * 29) >> 8;
  }

  // Motion mask (frame differencing)
  let motion = null;
  if (prevGray && (mode.includes('motion'))) {
    motion = new Uint8Array(w * h);
    for (let i = 0; i < w * h; i++) {
      motion[i] = Math.abs(gray[i] - prevGray[i]) > motionThresh ? 255 : 0;
    }
  }

  // Edge detection (Sobel)
  let edges = null;
  if (mode.includes('edge')) {
    edges = sobelEdges(gray, w, h, edgeThresh);
  }

  // Compose output
  const outData = frame.data;

  if (mode === 'gray') {
    for (let i = 0; i < w * h; i++) {
      const off = i * 4;
      outData[off] = outData[off + 1] = outData[off + 2] = gray[i];
    }
  } else if (mode === 'motion') {
    for (let i = 0; i < w * h; i++) {
      const off = i * 4;
      const m = motion ? motion[i] : 0;
      outData[off] = m;
      outData[off + 1] = m;
      outData[off + 2] = m;
    }
  } else if (mode === 'edges') {
    for (let i = 0; i < w * h; i++) {
      const off = i * 4;
      const e = edges ? edges[i] : 0;
      outData[off] = e;
      outData[off + 1] = e;
      outData[off + 2] = e;
    }
  } else if (mode === 'gray+edges') {
    for (let i = 0; i < w * h; i++) {
      const off = i * 4;
      const g = gray[i];
      const e = edges ? edges[i] : 0;
      if (e > 0) {
        outData[off] = 0;
        outData[off + 1] = 255;
        outData[off + 2] = 0;
      } else {
        outData[off] = outData[off + 1] = outData[off + 2] = g;
      }
    }
  } else {
    // gray+motion+edges (default)
    for (let i = 0; i < w * h; i++) {
      const off = i * 4;
      const g = gray[i];
      const m = motion ? motion[i] : 0;
      const e = edges ? edges[i] : 0;

      if (e > 0 && m > 0) {
        // Edge + Motion = bright cyan
        outData[off] = 0;
        outData[off + 1] = 255;
        outData[off + 2] = 255;
      } else if (e > 0) {
        // Edge only = green
        outData[off] = 0;
        outData[off + 1] = 200;
        outData[off + 2] = 0;
      } else if (m > 0) {
        // Motion only = red overlay on gray
        outData[off] = Math.min(g + 140, 255);
        outData[off + 1] = g >> 1;
        outData[off + 2] = g >> 1;
      } else {
        // Background = dark gray
        outData[off] = outData[off + 1] = outData[off + 2] = g >> 1;
      }
    }
  }

  ctx.putImageData(frame, 0, 0);
  prevGray = gray;

  // FPS counter
  frameCount++;
  const now = performance.now();
  if (now - lastFpsTime >= 1000) {
    statsEl.textContent = frameCount + ' fps | ' + w + 'x' + h;
    frameCount = 0;
    lastFpsTime = now;
  }

  requestAnimationFrame(processFrame);
}

function sobelEdges(gray, w, h, threshold) {
  const edges = new Uint8Array(w * h);

  for (let y = 1; y < h - 1; y++) {
    for (let x = 1; x < w - 1; x++) {
      const idx = y * w + x;

      // Sobel kernels
      const tl = gray[(y - 1) * w + (x - 1)];
      const tc = gray[(y - 1) * w + x];
      const tr = gray[(y - 1) * w + (x + 1)];
      const ml = gray[y * w + (x - 1)];
      const mr = gray[y * w + (x + 1)];
      const bl = gray[(y + 1) * w + (x - 1)];
      const bc = gray[(y + 1) * w + x];
      const br = gray[(y + 1) * w + (x + 1)];

      // Gx = [-1 0 1; -2 0 2; -1 0 1]
      const gx = -tl + tr - 2 * ml + 2 * mr - bl + br;
      // Gy = [-1 -2 -1; 0 0 0; 1 2 1]
      const gy = -tl - 2 * tc - tr + bl + 2 * bc + br;

      // Approximate magnitude
      const mag = Math.abs(gx) + Math.abs(gy);
      edges[idx] = mag > threshold ? 255 : 0;
    }
  }
  return edges;
}
</script>
</body>
</html>
